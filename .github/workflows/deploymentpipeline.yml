name: Deploy Infrastructure

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Application Repo
        uses: actions/checkout@v4

      - name: Checkout Platform CDK
        uses: actions/checkout@v4
        with:
          repository: cloud-tech-86/cloud-platform-cdk
          path: ../cloud-platform-cdk

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit Tests
        run: npm test

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::786359465516:role/Github-OIDC-Role
          aws-region: ap-south-1

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      - name: CDK Diff
        run: cdk diff

      - name: CDK Deploy
        run: cdk deploy --require-approval never
