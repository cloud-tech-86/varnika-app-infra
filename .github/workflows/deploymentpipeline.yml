name: Deploy Infrastructure

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Application Repo
        uses: actions/checkout@v4

      - name: Checkout Platform CDK
        uses: actions/checkout@v4
        with:
          repository: cloud-tech-86/cloud-platform-cdk
          path: cloud-platform-cdk

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install App Dependencies
        run: npm ci

      - name: Install Platform CDK
        run: |
          cd cloud-platform-cdk
          npm ci
          npm run build

      - name: Build App
        run: npm run build

      - name: Test
        run: npm test

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::786359465516:role/Github-OIDC-Role
          aws-region: ap-south-1

      - name: CDK Diff
        run: cdk diff

      - name: CDK Deploy
        run: cdk deploy --require-approval never
